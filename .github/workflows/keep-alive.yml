name: Keep Render awake

# Pings the deployed site on a schedule so a Render free Web Service never idles
# out (it spins down after ~15 min of inactivity, causing a cold start).
#
# NOTE: The proper fix for a static SPA is to deploy it as a Render *Static Site*
# (served from the CDN, never sleeps) — then this workflow is unnecessary. This is
# the fallback for the Web-Service case.

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 min — under Render's 15-min idle window.
                             # GitHub cron is best-effort and may run a few min late.
  workflow_dispatch: {}      # manual "Run workflow" button

# Never let two pings overlap.
concurrency:
  group: keep-alive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping the site
        env:
          # Change this if the domain changes.
          SITE_URL: https://recepie-costing.onrender.com/
        run: |
          for i in 1 2 3; do
            code=$(curl -fsS -o /dev/null -w "%{http_code}" --max-time 40 "$SITE_URL") \
              && { echo "OK $code"; exit 0; }
            echo "attempt $i failed, retrying in 15s…"
            sleep 15
          done
          echo "site did not respond after 3 attempts"
          exit 1
