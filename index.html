<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <!-- manifest link is injected by vite-plugin-pwa at build. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#010c12" />
    <meta property="og:site_name" content="CostCraft" />
    <title>CostCraft — Recipe Costing &amp; Operations for Bookends Hospitality</title>
    <meta
      name="description"
      content="CostCraft is the recipe costing, yield and wastage platform for Bookends Hospitality — Capiche and Aiko. Standardise recipes and control food cost across every brand and outlet."
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="CostCraft — Recipe Costing for Bookends Hospitality" />
    <meta
      property="og:description"
      content="Recipe costing, yield and wastage management across Capiche and Aiko — brand and outlet-level cost visibility."
    />
    <!-- Dark brand bg from the very first paint, so there's never a white flash
         between the native splash and the app rendering. -->
    <style>
      html, body { margin: 0; background: #010c12; }
      #cc-boot {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; align-items: center; justify-content: center;
        background: #010c12;
      }
      #cc-boot img { width: 380px; max-width: 82vw; height: auto; }
    </style>
  </head>
  <body>
    <!-- Boot splash: the CostCraft logo on the dark bg, shown until the app mounts
         (React replaces #root's contents). No white background at any point. -->
    <div id="root">
      <div id="cc-boot"><img src="/brand/costcraft-logo.png" alt="CostCraft" /></div>
    </div>
    <script>
      // The boot splash + dark bg are for the INSTALLED app only. In a normal
      // browser tab, drop them so the marketing landing loads without a dark flash.
      (function () {
        try {
          var app =
            /[?&]app=1/.test(location.search) ||
            (window.matchMedia && matchMedia("(display-mode: standalone)").matches) ||
            localStorage.getItem("cc_app_mode") === "1" ||
            (document.referrer || "").indexOf("android-app://") === 0;
          if (!app) {
            var b = document.getElementById("cc-boot");
            if (b) b.remove();
            document.documentElement.style.background = "";
            document.body.style.background = "";
          }
        } catch (e) {}
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
